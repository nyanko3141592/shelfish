<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelfish - macOS Drag & Drop Shelf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; }
        .subtitle { font-size: 1.1rem; color: #888; margin-bottom: 48px; }
        .features { list-style: none; margin-bottom: 48px; }
        .features li { padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .features li::before { content: "→ "; color: #0a84ff; }
        .links { display: flex; gap: 16px; flex-wrap: wrap; }
        .links a {
            display: inline-block;
            padding: 12px 24px;
            background: #1a1a1a;
            color: #0a84ff;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .links a:hover { background: #222; }
        footer { margin-top: 80px; color: #555; font-size: 0.85rem; }
        footer a { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shelfish</h1>
        <p class="subtitle">画面端に現れるドラッグ＆ドロップシェルフ for macOS</p>

        <ul class="features">
            <li>ファイルを画面端にドラッグするだけで一時保管</li>
            <li>別のアプリへドラッグアウトして移動完了</li>
            <li>メニューバーから常駐、Dockアイコンなし</li>
            <li>上下左右どの画面端にも配置可能</li>
            <li>ファイルのコピーは一切なし、URL参照のみ</li>
        </ul>

        <div class="links">
            <a href="https://github.com/nyanko3141592/shelfish">GitHub</a>
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="support.html">サポート</a>
        </div>

        <footer>
            <p>&copy; 2025 nyanko3141592. <a href="https://github.com/nyanko3141592/shelfish/blob/main/LICENSE">MIT License</a></p>
        </footer>
    </div>
</body>
</html>
