name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          mkdir -p Shelfish.app/Contents/MacOS
          mkdir -p Shelfish.app/Contents/Resources
          cp .build/release/Shelfish Shelfish.app/Contents/MacOS/
          cp Resources/AppIcon.icns Shelfish.app/Contents/Resources/
          cat > Shelfish.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Shelfish</string>
              <key>CFBundleDisplayName</key>
              <string>Shelfish</string>
              <key>CFBundleIdentifier</key>
              <string>com.shelfish.app</string>
              <key>CFBundleVersion</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleExecutable</key>
              <string>Shelfish</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - Shelfish.app

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg-contents
          cp -R Shelfish.app dmg-contents/
          ln -s /Applications dmg-contents/Applications

          # Create DMG
          hdiutil create -volname "Shelfish" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            Shelfish-${{ github.ref_name }}-arm64.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Shelfish-${{ github.ref_name }}-arm64.dmg
          generate_release_notes: true
